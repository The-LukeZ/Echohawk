services:
  echohawk:
    build: .
    env_file: .env
    restart: unless-stopped
    depends_on:
      - valkey
    volumes:
      - echohawk_data:/app/data

  valkey:
    image: valkey/valkey:latest
    restart: unless-stopped
    volumes:
      - valkey_data:/data

volumes:
  valkey_data:
  echohawk_data: